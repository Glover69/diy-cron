<section class="entire-dashboard flex flex-col h-dvh md:grid md:grid-cols-7 xl:grid-cols-10 2xl:grid-cols-11">
   <div class="md:hidden flex items-center justify-between px-4 py-3 border-b border-[#E3E4DD]">
   <button
  type="button"
  class="inline-flex items-center justify-center w-10 h-10 rounded-md border border-[#E3E4DD] text-text-main"
  aria-label="Open sidebar"
  [attr.aria-expanded]="isSidebarOpen ? 'true' : 'false'"
  [attr.aria-controls]="'sidebar'"
  (click)="toggleSidebar()">
  <!-- Simple hamburger icon -->
  <svg width="20" height="20" fill="none" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gray-400"></div>
      <!-- <img class="rounded-md" src="/icons/schedulr-logo-new.svg" width="28" height="28" alt=""> -->
      <span class="font-bold text-lg tracking-tight text-gray-800">DIY Cron.</span>
    </div>
    <div class="w-10"></div>
  </div>

   <!-- Mobile overlay -->
  <div
    class="fixed inset-0 bg-black/40 z-30 md:hidden transition-opacity"
    *ngIf="isSidebarOpen"
    (click)="closeSidebar()"
    aria-hidden="true">
  </div>

  <!-- Sidebar: off-canvas on mobile, static in grid on md+ -->
  <div
    class="
      side-bar
      fixed inset-y-0 left-0 z-40 w-64 bg-[#FEFEFC] p-5
      transform transition-transform duration-300
      -translate-x-full
      md:translate-x-0 md:static md:w-auto md:col-span-2 xl:col-span-2
      flex flex-col items-start justify-between h-full border-r border-gray-300
    "
    [class.translate-x-0]="isSidebarOpen"
    role="navigation"
    aria-label="Sidebar">

    <div class="top-part flex flex-col items-start w-full">
      <div class="sidebar-header w-full flex flex-col items-start gap-4">
        <div class="w-full flex items-center gap-2 py-4 border-b border-[#E3E4DD]">
          <div class="w-8 h-8 rounded-lg bg-gray-400"></div>
          <!-- <img class="rounded-md" src="/icons/schedulr-logo-new.svg" width="36" height="36" alt=""> -->
          <span class="font-bold text-xl xl:text-2xl tracking-tight text-gray-800">DIY Cron.</span>
        </div>
      </div>


      <div class="nav-items-group flex flex-col w-full items-start mt-5 gap-12">
        <div class="platform-group w-full flex flex-col gap-3">
          <span class="text-sm">Platform</span>

          <div class="nav-items flex flex-col items-start gap-2 w-full">
            @for (item of navItems; track $index) {
              <div [routerLinkActiveOptions]="{ exact: item.exact ?? false }" [routerLink]="item.link" routerLinkActive="bg-brand-50 text-brand-700 font-semibold" class="item w-full flex items-center gap-2 px-2 py-1 cursor-pointer rounded-md">
                <span routerLinkActive="ph-bold" [ngClass]="`ph ph-${item.icon}`"></span>
                <span>{{item.label}}</span>
              </div>
            }
          </div>
          
        </div>


         <div class="extras-group w-full flex flex-col gap-3">
          <span class="text-sm">Extras</span>

          <div class="nav-items flex flex-col items-start gap-2 w-full">
            <div class="item w-full flex items-center gap-2">
                <span [ngClass]="`ph ph-gear`"></span>
                <span>Settings</span>
            </div>

            <div class="item w-full flex items-center gap-2">
                <span [ngClass]="`ph ph-user-sound`"></span>
                <span>Give feedback</span>
            </div>

          </div>
        </div>
      </div>

    
    </div>
  



    <div class="flex flex-col items-start gap-2 w-full">

    <div class="w-full flex flex-col items-start gap-2 py-4">
      @if (!user) {
        <app-button label="Login" variant="secondary" class="xl:text-xl"></app-button>
      } @else {
        <div class="flex flex-col items-start gap-5 w-full">
          <div class="flex items-center gap-2">
            <div class="img-container flex md:hidden lg:flex w-12 h-12 overflow-hidden rounded-lg">
              <img [src]="user.profileImage" class="object-cover" alt="User avatar">
            </div>
            <div class="flex flex-col items-start">
              <span class="font-bold text-gray-800">{{user.name}}</span>
              <span class="font-regular text-gray-600 text-sm">{{user.email}}</span>
            </div>
          </div>
        </div>
      }
    </div>
    </div>

  </div>



  <div class="content-section w-full flex-1 md:col-span-5 xl:col-span-8 2xl:col-span-9 max-h-screen bg-[#FEFEFC]">
    <router-outlet></router-outlet>
  </div>




</section>
